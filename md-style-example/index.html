<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 风格预览器 (带提示词复制)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        /* --- 基础和布局 --- */
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- 通用 Markdown 元素样式 --- */
        .markdown-body {
            line-height: 1.7;
            transition: all 0.3s ease-in-out;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-weight: 700;
            margin-top: 1.5em;
            margin-bottom: 0.8em;
            line-height: 1.3;
        }
        .markdown-body h1 { font-size: 2.25em; }
        .markdown-body h2 { font-size: 1.75em; }
        .markdown-body h3 { font-size: 1.25em; }
        .markdown-body p { margin-bottom: 1.25em; }
        .markdown-body a { text-decoration: none; font-weight: 600; }
        .markdown-body ul, .markdown-body ol { padding-left: 2em; margin-bottom: 1.25em; }
        .markdown-body li { margin-bottom: 0.5em; }
        .markdown-body blockquote { margin: 1.5em 0; padding: 0.5em 1.5em; }
        .markdown-body hr { margin: 2em 0; border: none; }
        .markdown-body code {
            font-family: 'Fira Code', monospace;
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            border-radius: 6px;
        }
        .markdown-body pre {
            font-family: 'Fira Code', monospace;
            padding: 1em;
            margin-bottom: 1.5em;
            border-radius: 8px;
            overflow-x: auto;
        }
        .markdown-body pre code {
            padding: 0;
            font-size: inherit;
            background-color: transparent !important;
            border: none !important;
        }

        /* --- Theme 1: GitHub --- */
        .theme-github { color: #24292e; }
        .theme-github h1, .theme-github h2 { border-bottom: 1px solid #eaecef; padding-bottom: .3em; }
        .theme-github a { color: #0366d6; }
        .theme-github a:hover { text-decoration: underline; }
        .theme-github blockquote { color: #6a737d; border-left: .25em solid #dfe2e5; background-color: #f6f8fa; }
        .theme-github hr { height: .25em; background-color: #e1e4e8; border: 0; }
        .theme-github code { background-color: rgba(27,31,35,.05); }
        .theme-github pre { background-color: #f6f8fa; }

        /* --- Theme 2: 少数派 --- */
        .theme-sspai { color: #333; }
        .theme-sspai h1, .theme-sspai h2, .theme-sspai h3 { color: #000; }
        .theme-sspai h2 { background: linear-gradient(to right, #D33F3F 0, #D33F3F 5px, transparent 5px); background-repeat: no-repeat; padding-left: 15px; }
        .theme-sspai a { color: #D33F3F; }
        .theme-sspai a:hover { border-bottom: 2px solid #D33F3F; }
        .theme-sspai blockquote { color: #555; border-left: 3px solid #D33F3F; background-color: #f8f8f8; font-style: italic; }
        .theme-sspai hr { height: 1px; background-color: #eee; }
        .theme-sspai code { color: #D33F3F; background-color: #f7f7f7; border: 1px solid #eee;}
        .theme-sspai pre { background-color: #2d2d2d; color: #f1f1f1; border: none;}

        /* --- Theme 3: 暗色模式 --- */
        .theme-dark { background-color: #1a1a1b; color: #d7dadc; }
        .theme-dark h1, .theme-dark h2, .theme-dark h3 { color: #ffffff; border-color: #343536; }
        .theme-dark a { color: #4f9eed; }
        .theme-dark blockquote { color: #d7dadc; border-left-color: #4f9eed; background-color: #272729; }
        .theme-dark hr { background-color: #343536; }
        .theme-dark code { background-color: #272729; color: #d7dadc; }
        .theme-dark pre { background-color: #272729; }

        /* --- Theme 4: 学术论文 --- */
        .theme-academic { font-family: 'Lora', serif; color: #333; max-width: 800px; margin-left: auto; margin-right: auto; }
        .theme-academic h1, .theme-academic h2, .theme-academic h3 { font-family: 'Inter', sans-serif; border: none; }
        .theme-academic a { color: #1a5b9c; border-bottom: 1px solid #a3c4e3; }
        .theme-academic a:hover { border-bottom: 2px solid #1a5b9c; }
        .theme-academic blockquote { border-left-color: #ccc; background: none; font-style: italic; }
        .theme-academic hr { height: 1px; background-color: #ccc; }
        .theme-academic code { background-color: #f5f5f5; }
        .theme-academic pre { background-color: #f5f5f5; border: 1px solid #e0e0e0; }

        /* --- Theme 5: 瑞士简约 --- */
        .theme-swiss { color: #111; }
        .theme-swiss h1, .theme-swiss h2, .theme-swiss h3 { font-weight: 900; letter-spacing: -0.02em; border: none; }
        .theme-swiss a { color: #007aff; border: none; font-weight: 700; }
        .theme-swiss a:hover { text-decoration: underline; }
        .theme-swiss blockquote { border-left: 2px solid #007aff; background: none; padding-left: 2em; }
        .theme-swiss hr { background-color: #e5e5e5; height: 1px; }
        .theme-swiss code { background: #f0f0f0; }
        .theme-swiss pre { background: #f0f0f0; }

        /* --- Theme 6: Bear --- */
        .theme-bear { color: #4A4A4A; }
        .theme-bear h1, .theme-bear h2, .theme-bear h3 { color: #333; font-weight: 700; border: none; }
        .theme-bear h1 { font-size: 2.5em; }
        .theme-bear a { color: #C44536; text-decoration: underline; text-decoration-style: dotted; }
        .theme-bear a:hover { text-decoration-style: solid; }
        .theme-bear blockquote { border-left: 3px solid #EAEAEA; color: #777; background: none; }
        .theme-bear hr { height: 2px; background-color: #EAEAEA; border-radius: 1px; }
        .theme-bear code { color: #C44536; background-color: #F7F7F7; }
        .theme-bear pre { background-color: #2E3440; color: #D8DEE9; }

        /* --- Theme 7: Notion --- */
        .theme-notion { color: #37352F; }
        .theme-notion h1, .theme-notion h2, .theme-notion h3 { border: none; padding-bottom: 0; }
        .theme-notion h1 { font-size: 2.5em; }
        .theme-notion h2 { font-size: 1.8em; }
        .theme-notion h3 { font-size: 1.4em; }
        .theme-notion a { color: inherit; border-bottom: 1px solid rgba(55, 53, 47, 0.4); }
        .theme-notion a:hover { background-color: rgba(55, 53, 47, 0.08); }
        .theme-notion blockquote { border-left: 3px solid #37352F; background: none; padding: 0.2em 1.2em; }
        .theme-notion hr { background-color: rgba(55, 53, 47, 0.16); height: 1px; }
        .theme-notion code { background-color: rgba(135, 131, 120, 0.15); color: #EB5757; border-radius: 3px; }
        .theme-notion pre { background-color: #F7F6F3; border: 1px solid rgba(55, 53, 47, 0.16); }
        .theme-notion pre code { color: #37352F; }

        /* --- Theme 8: Dracula --- */
        .theme-dracula { background-color: #282a36; color: #f8f8f2; }
        .theme-dracula h1, .theme-dracula h2, .theme-dracula h3 { color: #bd93f9; border-bottom-color: #44475a; }
        .theme-dracula a { color: #ff79c6; }
        .theme-dracula a:hover { text-decoration: underline; }
        .theme-dracula blockquote { background-color: #44475a; border-left: 3px solid #f1fa8c; color: #f8f8f2; }
        .theme-dracula hr { background-color: #6272a4; height: 1px; }
        .theme-dracula code { background-color: #44475a; color: #50fa7b; }
        .theme-dracula pre { background-color: #282a36; border: 1px solid #44475a; }
        .theme-dracula pre code { color: #f8f8f2; }
    </style>
</head>
<body class="bg-gray-100 transition-colors duration-300">

    <div class="container mx-auto p-4 sm:p-8">
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-bold mb-4 text-center text-gray-800">1. 选择一个渲染风格</h2>
            <div id="theme-switcher" class="flex flex-wrap justify-center gap-3">
                <!-- Buttons are generated by JS -->
            </div>
             <div id="action-bar" class="mt-6 text-center">
                <button id="copy-prompt-btn" class="px-5 py-2.5 rounded-md text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-offset-2 transition-all duration-200 ease-in-out">
                    复制提示词
                </button>
            </div>
        </div>

        <div id="markdown-container" class="rounded-lg shadow-md p-6 sm:p-10">
            <div id="content" class="markdown-body">
                <!-- Markdown content is injected here -->
            </div>
        </div>
    </div>

    <script>
        const themes = {
            "theme-github": {
                name: "GitHub",
                button: "bg-gray-200 text-gray-800 hover:bg-gray-300 focus:ring-gray-400",
                body: "bg-gray-50",
                prompt: "创建一个Markdown样式，模仿GitHub的亮色主题。整体感觉清晰、规范，适合技术文档。字体：使用无衬线字体（如Inter）。颜色：背景为白色，正文为深灰色（#24292e）。链接为蓝色（#0366d6），悬停时有下划线。标题：H1和H2有灰色底边线（#eaecef）。引用块：有灰色左边框和浅灰色背景（#f6f8fa）。代码：行内和代码块都使用浅灰色背景（#f6f8fa）。"
            },
            "theme-sspai": {
                name: "少数派",
                button: "bg-red-600 text-white hover:bg-red-700 focus:ring-red-500",
                body: "bg-white",
                prompt: "创建一个Markdown样式，模仿科技媒体“少数派”的现代风格。整体感觉活泼、有辨识度。字体：使用清晰的无衬线字体。颜色：主色调为醒目的红色（#D33F3F）。链接使用此红色，悬停时有红色底边线。标题：H2标题左侧有独特的红色竖线装饰。引用块：有红色左边框和浅灰色背景，文本为斜体。代码：行内代码为红色文本，代码块使用高对比度的暗色背景（#2d2d2d）。"
            },
            "theme-dark": {
                name: "暗色模式",
                button: "bg-gray-700 text-white hover:bg-gray-600 focus:ring-gray-500",
                body: "bg-black",
                prompt: "创建一个通用的暗色Markdown样式，提供舒适的夜间阅读体验。字体：使用无衬线字体。颜色：背景为深灰色（#1a1a1b），正文为灰白色（#d7dadc）。链接为亮蓝色（#4f9eed）。标题：颜色为纯白。引用块：有蓝色左边框和更深一点的灰色背景（#272729）。代码：行内和代码块都使用与引用块相同的深灰色背景。"
            },
            "theme-academic": {
                name: "学术论文",
                button: "bg-blue-100 text-blue-800 hover:bg-blue-200 focus:ring-blue-400",
                body: "bg-gray-50",
                prompt: "创建一个Markdown样式，模拟学术论文的排版。整体感觉严谨、专业，适合长文阅读。字体：正文使用衬线字体（如Lora），标题使用无衬线字体（如Inter）以形成对比。颜色：白底黑字。链接为深蓝色（#1a5b9c），有浅蓝色底边线。布局：内容区域最大宽度限制在800px左右。引用块：仅有灰色左边框，无背景色，文本为斜体。代码：使用浅灰色背景。"
            },
            "theme-swiss": {
                name: "瑞士简约",
                button: "bg-yellow-300 text-black hover:bg-yellow-400 focus:ring-yellow-500",
                body: "bg-white",
                prompt: "创建一个基于瑞士平面设计主义的Markdown样式。整体感觉极简、现代、功能性强。字体：使用无衬线字体（如Inter），标题字重非常大（900）。颜色：白底黑字。链接为蓝色（#007aff），无下划线。布局：强调元素间距和对齐。引用块：仅有蓝色左边框，无背景色，左内边距较大。代码：行内和代码块都使用统一的浅灰色背景（#f0f0f0）。"
            },
            "theme-bear": {
                name: "Bear",
                button: "bg-red-100 text-red-800 hover:bg-red-200 focus:ring-red-500",
                body: "bg-white",
                prompt: "创建一个Markdown样式，灵感来自笔记应用Bear。整体感觉优雅、精致。字体：清晰的无衬线字体。颜色：主强调色为一种复古的红色（#C44536）。链接使用此红色，并带有虚线式下划线。引用块：只有一条极简的浅灰色左边框。代码：行内代码为红色文本，代码块使用'Nord'主题的暗色背景（#2E3440）。"
            },
            "theme-notion": {
                name: "Notion",
                button: "bg-gray-200 text-gray-800 hover:bg-gray-300 focus:ring-gray-400",
                body: "bg-gray-50",
                prompt: "创建一个模仿生产力工具Notion的Markdown样式。风格极简、克制，注重内容本身。字体：无衬线字体。颜色：背景为略带灰的白色（#F7F6F3），正文为深灰（#37352F）。链接与正文同色，但有灰色底边线，悬停时有浅灰色背景。引用块：有深灰色左边框，无背景色。代码：行内代码有浅灰色圆角背景，文本为红色（#EB5757）。代码块背景为浅灰色（#F7F6F3）。"
            },
            "theme-dracula": {
                name: "Dracula",
                button: "bg-purple-800 text-white hover:bg-purple-900 focus:ring-purple-600",
                body: "bg-gray-900",
                prompt: "创建一个基于'Dracula'代码主题的Markdown样式。整体是多彩的暗色风格。字体：使用等宽字体进行代码展示。颜色：背景为深蓝紫色（#282a36），正文为灰白色（#f8f8f2）。标题为淡紫色（#bd93f9），链接为粉色（#ff79c6），行内代码为绿色（#50fa7b）。引用块：有黄色左边框和深灰色背景（#44475a）。代码块与主背景同色，但有边框。"
            }
        };

        const markdownContent = `
            <h1>Markdown: 一种轻量级标记语言</h1>
            <p>Markdown 是一种<strong>轻量级标记语言</strong>，它允许人们使用易读易写的纯文本格式编写文档，然后转换成有效的XHTML（或者HTML）文档。这种语言吸收了很多在电子邮件中已有的纯文本标记的特性。</p>
            <h2>核心理念</h2>
            <p>它的核心理念是：<em>“易读易写”</em>。一份使用 Markdown 格式撰写的文件应该可以直接以纯文本发布，并且看起来不会像是由很多标签或是格式指令所构成。可以访问 <a href="#">Markdown 官网</a> 了解更多。</p>
            <blockquote><p>可读性，无论如何，都是最重要的。一份 Markdown 格式的文档，应该可以直接以纯文本发布，并且看起来不会像是由很多标签或是格式指令所构成。</p></blockquote>
            <h3>功能列表</h3>
            <ul><li>标题</li><li>段落与换行</li><li>区块引言</li><li>列表：有序和无序</li></ul>
            <h3>实现步骤</h3>
            <ol><li>学习基本语法。</li><li>选择一个合适的编辑器。</li><li>开始你的创作！</li></ol>
            <hr>
            <p>你也可以插入代码。对于单行代码，可以使用行内代码，例如 <code>const greeting = "Hello World";</code> 这样。</p>
            <p>对于多行代码块，可以这样表示：</p>
            <pre><code>// 这是一个 JavaScript 代码块示例
function factorial(n) {
  if (n === 0) {
    return 1;
  }
  return n * factorial(n - 1);
}
console.log(factorial(5)); // 输出: 120
</code></pre>
            <p>希望这些示例能帮助你选择最喜欢的风格！</p>
        `;

        const container = document.getElementById('markdown-container');
        const contentDiv = document.getElementById('content');
        const switcher = document.getElementById('theme-switcher');
        const copyBtn = document.getElementById('copy-prompt-btn');
        let currentTheme = 'theme-github';

        // 初始化
        function init() {
            // 注入内容
            contentDiv.innerHTML = markdownContent;

            // 生成按钮
            for (const key in themes) {
                const theme = themes[key];
                const button = document.createElement('button');
                button.dataset.theme = key;
                button.textContent = theme.name;
                button.className = 'px-4 py-2 rounded-md text-sm font-medium focus:outline-none focus:ring-2 focus:ring-offset-2 transition-all';
                switcher.appendChild(button);
            }

            // 事件监听
            switcher.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') {
                    const themeName = e.target.dataset.theme;
                    setTheme(themeName);
                }
            });

            copyBtn.addEventListener('click', () => {
                const promptText = themes[currentTheme].prompt;
                copyToClipboard(promptText);
            });

            // 加载上次选择的主题或默认主题
            const savedTheme = localStorage.getItem('markdown_theme') || 'theme-github';
            setTheme(savedTheme);
        }

        function setTheme(themeName) {
            currentTheme = themeName;
            
            // 更新容器
            container.className = 'rounded-lg shadow-md p-6 sm:p-10 transition-all duration-300'; // 重置
            container.classList.add(themeName);
            
            // 更新页面背景
            document.body.className = '';
            document.body.classList.add(themes[themeName].body, 'transition-colors', 'duration-300');

            // 更新选择按钮样式
            switcher.querySelectorAll('button').forEach(btn => {
                const themeKey = btn.dataset.theme;
                btn.className = 'px-4 py-2 rounded-md text-sm font-medium focus:outline-none focus:ring-2 focus:ring-offset-2 transition-all';
                if (themeKey === themeName) {
                    btn.classList.add(...themes[themeKey].button.split(' '));
                    btn.classList.add('ring-2', 'ring-offset-2', themes[themeKey].button.split(' ').find(c => c.startsWith('focus:ring-')).replace('focus:', ''));
                } else {
                    btn.classList.add('bg-gray-200', 'text-gray-600', 'hover:bg-gray-300');
                }
            });

             // 更新复制按钮样式
            const copyBtnBaseClasses = 'px-5 py-2.5 rounded-md text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-offset-2 transition-all duration-200 ease-in-out';
            const copyBtnThemeClasses = themes[themeName].button;
            copyBtn.className = `${copyBtnBaseClasses} ${copyBtnThemeClasses}`;
            
            localStorage.setItem('markdown_theme', themeName);
        }

        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '已复制！';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            } catch (err) {
                console.error('无法复制提示词: ', err);
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '复制失败';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            }
            document.body.removeChild(textarea);
        }

        init();
    </script>
</body>
</html>
