<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gradient-circle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
    
    <clipPath id="clip-circle">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>
  
  <!-- 背景 -->
  <circle cx="100" cy="100" r="100" fill="url(#bg3)"/>
  
  <!-- 装饰圆形 -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#gradient-circle)" stroke-width="1.5" opacity="0.2" stroke-dasharray="5,3"/>
  
  <!-- 大圆形背景 -->
  <circle cx="100" cy="80" r="50" fill="url(#gradient-circle)" opacity="0.1"/>
  
  <!-- 主字母 K - 现代设计 -->
  <g transform="translate(70, 60)">
    <!-- K - 粗细对比 -->
    <path d="M 0 0 L 0 50" stroke="#0f172a" stroke-width="10" stroke-linecap="round"/>
    <path d="M 0 20 L 25 0" stroke="url(#gradient-circle)" stroke-width="7" stroke-linecap="round"/>
    <path d="M 0 20 L 25 50" stroke="url(#gradient-circle)" stroke-width="7" stroke-linecap="round"/>
  </g>
  
  <!-- 装饰元素 -->
  <rect x="30" y="130" width="15" height="3" fill="#06b6d4" opacity="0.6" rx="1.5"/>
  <rect x="50" y="130" width="8" height="3" fill="#3b82f6" opacity="0.6" rx="1.5"/>
  <rect x="155" y="130" width="15" height="3" fill="#8b5cf6" opacity="0.6" rx="1.5"/>
  
  <!-- 底部标签 -->
  <g transform="translate(100, 155)">
    <rect x="-35" y="-8" width="70" height="18" fill="url(#gradient-circle)" opacity="0.1" rx="9"/>
    <text x="0" y="3" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569" text-anchor="middle" font-weight="600">
      kamjin
    </text>
  </g>
</svg>
